<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KONECTO — Ofertas y Demandas</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="ofertas_demandas.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">KONECTO</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="../dashboard/index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="../login/index.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Ofertas y Demandas</a></li>
                    <li class="nav-item"><a class="nav-link" href="../usuarios/index.html">Altas Usuarios</a></li>
                </ul>
                <div class="navbar-text text-white">
                    <span id="usuarioActivo">no conectado</span>
                    <a href="#" id="logoutButton" class="ms-2 d-none">(salir)</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="form-empleos shadow">
                    <div class="form-empleos-header"><h2>NUEVA PUBLICACIÓN</h2></div>
                    <div class="form-empleos-body">
                        <form id="formEmpleos">
                            <div class="mb-3">
                                <label class="form-label">Título de la actividad</label>
                                <input type="text" id="titulo" class="form-control" required>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Email de contacto</label>
                                    <input type="email" id="emailContacto" class="form-control" required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">Fecha</label>
                                    <input type="date" id="fecha" class="form-control" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Tipo</label>
                                    <select id="tipo" class="form-select" required>
                                        <option value="Oferta">Oferta</option>
                                        <option value="Demanda">Demanda</option>
                                    </select>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">Acción</label>
                                    <button type="submit" class="btn-alta">PUBLICAR</button>
                                </div>
                            </div>
                            <div class="d-none">
                                <textarea id="descripcion">Autogenerado</textarea>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="tabla-empleos-wrapper h-100 shadow">
                    <div class="tabla-empleos-header">ESTADÍSTICAS REALES</div>
                    <div class="tabla-empleos-body d-flex flex-column align-items-center justify-content-center h-100">
                        <canvas id="graficoCanvas" width="280" height="180"></canvas>
                        <div class="mt-3 fw-bold">
                            <span style="color:var(--naranja)">● OFERTAS</span>
                            <span class="ms-4" style="color:var(--azul-marino)">● DEMANDAS</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 mb-5">
                <div class="tabla-empleos-wrapper shadow">
                    <div class="tabla-empleos-header">LISTADO DE PUBLICACIONES</div>
                    <div class="tabla-empleos-body">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ACTIVIDAD</th>
                                    <th>CONTACTO</th>
                                    <th>FECHA</th>
                                    <th>MODALIDAD</th>
                                    <th>ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody id="tablaEmpleosBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="ofertas_demandas.js"></script>
</body>
</html>
