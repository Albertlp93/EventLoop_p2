<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KONECTO — Usuarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="usuarios.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">KONECTO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="../dashboard/index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="../login/index.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="../ofertas_demandas/index.html">Ofertas y Demandas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Altas Usuarios</a></li>
                </ul>
                <div class="navbar-text">
                    <span id="usuarioActivo">no conectado</span>
                    <a href="#" id="logoutButton" class="ms-2 d-none">(salir)</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="form-empleos shadow">
                    <div class="form-empleos-header">
                        <h2>NUEVO USUARIO</h2>
                    </div>
                    <div class="form-empleos-body">
                        <form id="userForm">
                            <div class="mb-3">
                                <label class="form-label">Nombre completo</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="emailUser" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="passUser" class="form-control" required>
                            </div>
                            <button type="submit" class="btn-alta">DAR DE ALTA</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="tabla-empleos-wrapper shadow">
                    <div class="tabla-empleos-header">
                        LISTADO DE USUARIOS
                    </div>
                    <div class="tabla-empleos-body">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>NOMBRE</th>
                                    <th>CORREO</th>
                                    <th>PASSWORD</th>
                                    <th>ACCIONES</th>
                                </tr>
                            </thead>
                            <tbody id="tablaUsuariosBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="usuarios.js"></script>
</body>
</html>
