<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - VoluntariApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="usuarios.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Konecto</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="../dashboard/index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="../login/index.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="../ofertas_demandas/index.html">Ofertas y demandas</a></li>
                    <li class="nav-item"><a class="navbar-brand fw-bold" href="#">Usuarios</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span id="usuarioActivo" class="badge bg-secondary me-3">-no login-</span>
                    <button id="logoutButton" class="btn btn-outline-danger btn-sm d-none">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Nuevo Usuario</h5>
                        <form id="userForm">
                            <div class="mb-3">
                                <label class="form-label">Nombre completo</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="emailUser" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="passUser" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Registrar Usuario</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Usuarios Registrados</h5>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Email</th>
                                        <th>Password</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaUsuariosBody">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="usuarios.js"></script>
</body>
</html>
