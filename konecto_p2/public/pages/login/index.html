<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VoluntariApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-5">
        <div class="container">
            
            <a class="navbar-brand fw-bold" href="#">Konecto</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="../dashboard/index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="navbar-brand fw-bold" href="#">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="../ofertas_demandas/index.html">Ofertas y demandas</a></li>
                    <li class="nav-item"><a class="nav-link" href="../usuarios/index.html">Usuarios</a></li>
                </ul>
                
                <div class="d-flex align-items-center">
                    <span id="usuarioActivo" class="badge bg-secondary me-3">-no login-</span>
                    <button id="logoutButton" class="btn btn-outline-danger btn-sm d-none">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-sm p-4">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Bienvenido</h2>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required placeholder="admin@test.com">
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required placeholder="1234">
                            </div>
                            <button type="submit" id="loginButton" class="btn btn-primary w-100 py-2">
                                Iniciar Sesión
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="login.js"></script>
</body>
</html>
