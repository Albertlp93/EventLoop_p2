<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KONECTO — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">KONECTO</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="../dashboard/index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="../ofertas_demandas/index.html">Ofertas y Demandas</a></li>
                    <li class="nav-item"><a class="nav-link" href="../usuarios/index.html">Altas Usuarios</a></li>
                </ul>
                <div class="navbar-text">
                    <span id="usuarioActivo">no conectado</span>
                    <a href="#" id="logoutButton" class="ms-2 d-none">(salir)</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="login-card shadow-lg">
                    <div class="login-header">
                        <h2>INICIAR SESIÓN</h2>
                    </div>
                    <div class="login-body">
                        <form id="loginForm">
                            <div class="login-campos mb-3">
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" id="email" class="form-control" required>
                                </div>
                                <div>
                                    <label class="form-label">Contraseña</label>
                                    <input type="password" id="password" class="form-control" required>
                                </div>
                            </div>
                            <button type="submit" id="loginButton" class="btn-login">ENTRAR</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="login.js"></script>
</body>
</html>
